name: 03 Build and Push Docker Image Workflow

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main


env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image
  TRIVY_IMAGE_REPORT: trivy-image-scan-report.txt

  AWS_REGION: us-east-1
  ECR_REPOSITORY: github_action


jobs:

# ---------------- VERIFY ----------------

  verify:

    runs-on: ubuntu-latest

    steps:

      - name: Check out repository
        uses: actions/checkout@v6


      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: 1


      - name: Run Trivy Dockerfile Configuration Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: 1


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"


      - name: Run tests
        run: python -m unittest discover -s tests -v



# ---------------- BUILD ----------------

  build-package:

    needs: verify

    runs-on: ubuntu-latest


    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}


    steps:

      - name: Check out repository
        uses: actions/checkout@v6


      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"


      - name: Build Docker image
        run: |
          docker build \
          -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
          .


      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}'
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table
          output: ${{ env.TRIVY_IMAGE_REPORT }}


      - name: Save Docker image
        run: |
          docker save \
          "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
          -o "${IMAGE_TAR}"


      - name: Save image metadata
        run: |
          echo "IMAGE_TAG=${{ steps.image-tag.outputs.image_tag }}" > $IMAGE_METADATA
          echo "IMAGE_REFERENCE=${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" >> $IMAGE_METADATA


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7



# ---------------- PUSH TO ECR ----------------

  push-ecr:

    needs: build-package

    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository
        uses: actions/checkout@v6



      - name: Configure AWS credentials

        uses: aws-actions/configure-aws-credentials@v4

        with:

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: ${{ env.AWS_REGION }}



      - name: Login to Amazon ECR

        uses: aws-actions/amazon-ecr-login@v2



      - name: Build Docker image again

        run: |

          docker build \
          -t $IMAGE_NAME:${{ needs.build-package.outputs.image_tag }} \
          .



      # Tag image with version

      - name: Tag image with version

        run: |

          docker tag \
          $IMAGE_NAME:${{ needs.build-package.outputs.image_tag }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ needs.build-package.outputs.image_tag }}



      # Tag same image as latest

      - name: Tag image as latest

        run: |

          docker tag \
          $IMAGE_NAME:${{ needs.build-package.outputs.image_tag }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest




      # Push version tag

      - name: Push version image

        run: |

          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ needs.build-package.outputs.image_tag }}




      # Push latest tag

      - name: Push latest image

        run: |

          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest




      - name: Display deployment information

        run: |

          echo "================================"

          echo "Docker Images pushed successfully"

          echo ""

          echo "Version tag:"

          echo "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ needs.build-package.outputs.image_tag }}"

          echo ""

          echo "Latest tag:"

          echo "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"

          echo "================================"
