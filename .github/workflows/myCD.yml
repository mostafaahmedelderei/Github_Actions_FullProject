name: CD Deploy Docker Image to EC2


on:

  pull_request:

    branches:
      - main

    types:
      - closed



env:

  AWS_REGION: us-east-1

  ECR_REPOSITORY: github_action

  ECR_REGISTRY: 911558392071.dkr.ecr.us-east-1.amazonaws.com

  CONTAINER_NAME: tiny-health-container

  IMAGE_TAG: latest



jobs:


  deploy:


    # Run only when PR is merged, not just closed

    if: github.event.pull_request.merged == true


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v6



      - name: Deploy application to EC2


        uses: appleboy/ssh-action@v1.0.3


        with:


          host: ${{ secrets.EC2_HOST }}


          username: ec2-user


          key: ${{ secrets.EC2_SSH_KEY }}



          script: |


            echo "Logging in to Amazon ECR"



            aws ecr get-login-password \
            --region ${{ env.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin \
            ${{ env.ECR_REGISTRY }}



            echo "Pulling latest image"



            docker pull \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}



            echo "Stopping old container"



            docker stop ${{ env.CONTAINER_NAME }} || true


            docker rm ${{ env.CONTAINER_NAME }} || true



            echo "Starting new container"



            docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p 80:80 \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}



            echo "Waiting for container"



            sleep 10



            echo "Checking container status"



            if docker ps | grep ${{ env.CONTAINER_NAME }}

            then

              echo "Deployment successful"

            else

              echo "Deployment failed"

              docker logs ${{ env.CONTAINER_NAME }}

              exit 1

            fi
